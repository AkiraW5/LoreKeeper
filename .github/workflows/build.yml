name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Verificação rápida em pushes/PRs: garante que renderer + processo principal compilam.
  verify:
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build (renderer + main + preload)
        run: npx vite build

  # Release em tags v*: empacota instalador NSIS + portable e publica no GitHub Releases.
  release:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main + preload
        run: npx vite build

      - name: Package Windows app
        # --publish never: o electron-builder NÃO publica; quem publica é o passo abaixo.
        run: npx electron-builder --win --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lorekeeper-windows
          path: release/*.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          generate_release_notes: true
